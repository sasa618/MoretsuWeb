    <link rel="stylesheet" href="../assets/css/styles.css?v=20260306" />
    <link rel="stylesheet" href="../assets/css/about.css?v=20260306" />
  </head>
  <body data-page="about">
    <div class="page">
      <header class="site-header">
        <div class="header-inner">
          <a class="logo" href="../" aria-label="トップへ">
            <img src="../assets/logo.svg" alt="Logo" />
          </a>
          <nav class="nav" aria-label="グローバルナビゲーション">
            <a href="../service/index.html" data-link="service">Service</a>
            <a href="../about/index.html" data-link="about">about</a>
            <a href="../News/index.html" data-link="news">News</a>
            <a class="nav__cta" href="../contact/index.html">お問い合わせ</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="section about-hero">
          <p class="about-hero__eyebrow">member</p>
          <h1 class="section-title">メンバー紹介</h1>
          <p class="section-sub">写真をタップすると、挨拶コメントが小さなウィンドウで表示されます。</p>
        </section>

        <section class="section about-members" aria-labelledby="about-members-title">
          <h2 id="about-members-title" class="visually-hidden">メンバー一覧</h2>
          <div class="member-grid" id="memberGrid"></div>
        </section>
      </main>

      <div class="member-modal" id="memberModal" hidden>
        <div class="member-modal__window" role="dialog" aria-modal="true" aria-labelledby="memberModalName">
          <button class="member-modal__close" id="memberModalClose" type="button" aria-label="閉じる">×</button>
          <div class="member-modal__content">
            <div class="member-modal__left">
              <img id="memberModalImage" src="" alt="" />
            </div>
            <div class="member-modal__right">
              <p class="member-modal__role" id="memberModalRole"></p>
              <h3 class="member-modal__name" id="memberModalName"></h3>
              <p class="member-modal__greeting" id="memberModalGreeting"></p>
            </div>
          </div>
        </div>
      </div>

      <footer class="site-footer">
        <div class="footer-inner">
          <!-- NOTE: ここにある「Uniboost」は後で変更する想定 -->
          <p class="footer-brand">モーレツ</p>
          <p class="footer-note">© 2026 Uniboost (temporary)</p>
