<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <base href="../">
    <title>Contact | Uniboost（仮）</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=20260328" />
    <link rel="stylesheet" href="assets/css/contact.css?v=20260328" />
  </head>
  <body data-page="contact">
    <div class="page">
      <header class="site-header">
        <div class="header-inner">
          <a class="logo" href="index.html" aria-label="トップへ">
            <img src="assets/logo.png" alt="Logo" />
          </a>
          <nav class="nav" aria-label="グローバルナビゲーション">
            <a href="service/index.html" data-link="service"><span class="en">Service</span></a>
            <a href="member/index.html" data-link="member"><span class="en">Member</span></a>
            <a href="about/index.html" data-link="about"><span class="en">About</span></a>
            <a href="News/" data-link="news"><span class="en">News</span></a>
            <a class="nav__cta" href="contact/index.html" data-link="contact"><span class="jp">お問い合わせ</span></a>
          </nav>
        </div>
      </header>

      <main>
        <section class="section contact-hero">
          <div class="contact-shell">
            <h1 class="section-title contact-title jp">お問い合わせ</h1>
            <p class="section-sub contact-hero__sub txt">弊社へのお問い合わせは<br>こちらよりお願いいたします。</p>
          </div>
        </section>

        <section class="section contact-form-section">
          <form id="contactForm" class="contact-form" novalidate>
            <label class="form-field">
              <span class="form-label jp">お名前 <em>必須</em></span>
              <input type="text" name="name" required />
            </label>

            <label class="form-field">
              <span class="form-label jp">会社名 <em>必須</em></span>
              <input type="text" name="company" required />
            </label>

            <label class="form-field">
              <span class="form-label jp">メールアドレス <em>必須</em></span>
              <input type="email" name="email" required />
            </label>

            <label class="form-field">
              <span class="form-label jp">電話番号</span>
              <input type="tel" name="phone" />
            </label>

            <fieldset class="form-field form-fieldset">
              <legend class="form-label jp">概要 <em>必須</em></legend>
              <label class="radio-row jp"><input type="radio" name="summary" value="取材依頼" required /> 取材依頼</label>
              <label class="radio-row jp"><input type="radio" name="summary" value="サービスに関するご相談" required /> サービスに関するご相談</label>
            </fieldset>

            <label class="form-field">
              <span class="form-label jp">お問い合わせ内容 <em>必須</em></span>
              <textarea name="message" rows="8" required></textarea>
            </label>

            <p class="form-note txt">入力完了後「メール送付」を押すと、メールアプリが起動します。</p>
            <button type="submit" class="btn"><span class="jp">メール送付</span></button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <p class="footer-brand jp">モーレツ</p>
          <p class="footer-note">© 2026 Uniboost (temporary)</p>
        </div>
      </footer>
    </div>

    <script src="assets/js/main.js?v=20260328"></script>
  </body>
</html>
